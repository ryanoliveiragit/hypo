services:
  - type: web
    name: hypo-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hypo-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://hypo.lol,http://localhost:3000"

databases:
  - name: hypo-db
    databaseName: hypo
    user: hypo
    ipAllowList: []
